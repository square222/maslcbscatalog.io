<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой уникальный сайт</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Подключаем библиотеки -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
</head>
<body>
  <div class="particles"></div> <!-- Эффект частиц -->
  <div class="background"></div> <!-- Фон для параллакса -->
  <div class="container">
    <div class="photo-wrapper">
      <div class="photo-carousel">
        <img src="pic1.jpg" alt="Фото 1" class="active">
        <img src="pic2.jpg" alt="Фото 2">
        <img src="pic3.jpg" alt="Фото 3">
      </div>
      <button class="arrow left">◄</button>
      <button class="arrow right">►</button>
    </div>
    <div class="text">
      <h1>«Цифровая лаборатория»</h1>
      <p>Здесь установлен планетарный сканер «ЭларСкан», с помощью которого быстро и удобно оцифровываются ценные краеведческие издания, газеты и создается собственная электронная краеведческая база «Сохраняя прошлое, создаем будущее». </p>
    </div>
  </div>

  <!-- Подключаем GSAP и ScrollReveal -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js"></script>
  <script src="https://unpkg.com/scrollreveal"></script>
  <script src="script.js"></script>
</body>
</html>
